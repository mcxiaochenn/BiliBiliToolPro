runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body && body.code === 0 && body.data) {
          bru.setVar("rsa_hash", body.data.hash);
          bru.setVar("rsa_key", body.data.key);
          console.log("✅ Saved rsa_hash:", body.data.hash);
          console.log("✅ Saved rsa_key (first 40 chars):", body.data.key.substring(0, 40));
        } else {
          console.log("❌ Failed to get RSA key, response:", JSON.stringify(body));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

