info:
  name: api.bilibili.com
  type: folder
  seq: 3

request:
  variables:
    - name: host
      value: https://api.bilibili.com
  scripts:
    - type: before-request
      code: |-
        // Shared sign utility — see lib/sign.js
        const { signRequest } = require('./lib/sign');
        signRequest(req, bru);

        // WBI signing — see lib/wbi.js
        const { signWbi } = require('./lib/wbi');
        await signWbi(req, bru);
