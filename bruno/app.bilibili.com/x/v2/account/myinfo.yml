info:
  name: myinfo
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}/x/v2/account/myinfo?access_key={{access_key}}&appkey={{appKeyGuest}}&build={{build}}&buvid={{buvid}}&c_locale=zh_CN&channel=yingyongbao&disable_rcmd=0&local_id={{buvid}}&mobi_app=android&platform=android&s_locale=zh_CN&statistics={{statistics}}&ts={{ts}}&sign={{sign}}"
  headers:
    - name: x-bili-aurora-eid
      value: UlAAQFkMBVkH
    - name: x-bili-mid
      value: "{{mid}}"
    - name: x-bili-aurora-zone
      value: ""
    - name: x-bili-gaia-vtoken
      value: ""
    - name: bili-http-engine
      value: cronet
  params:
    - name: access_key
      value: "{{access_key}}"
      type: query
    - name: appkey
      value: "{{appKeyGuest}}"
      type: query
    - name: build
      value: "{{build}}"
      type: query
    - name: buvid
      value: "{{buvid}}"
      type: query
    - name: c_locale
      value: zh_CN
      type: query
    - name: channel
      value: yingyongbao
      type: query
    - name: disable_rcmd
      value: "0"
      type: query
    - name: local_id
      value: "{{buvid}}"
      type: query
    - name: mobi_app
      value: android
      type: query
    - name: platform
      value: android
      type: query
    - name: s_locale
      value: zh_CN
      type: query
    - name: statistics
      value: "{{statistics}}"
      type: query
    - name: ts
      value: "{{ts}}"
      type: query
    - name: sign
      value: "{{sign}}"
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

